<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorama</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --primary: #3b82f6;
            --secondary: #60a5fa;
            --card-back: rgba(30, 41, 59, 0.9);
            --card-front: #fff;
            --text-light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e3a8a 0%, #0f172a 100%);
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .back-btn {
            background: transparent;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        .back-btn:hover { color: var(--primary); }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 100px);
            gap: 15px;
            perspective: 1000px;
        }

        @media (max-width: 400px) {
            .grid {
                grid-template-columns: repeat(4, 70px);
                grid-template-rows: repeat(4, 90px);
                gap: 10px;
            }
        }

        .card {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .card.flipped { transform: rotateY(180deg); }
        .card.matched { transform: rotateY(180deg) scale(0.95); opacity: 0.8; cursor: default; }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-size: 2.5rem;
        }

        .card-back {
            background: linear-gradient(135deg, var(--card-back), #0f172a);
            border: 2px solid var(--primary);
            color: var(--primary);
            font-size: 1.5rem;
        }

        .card-front {
            background: var(--card-front);
            transform: rotateY(180deg);
            border: 2px solid #fff;
        }

        #game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 41, 59, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--primary);
            display: none;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        #game-over h2 { color: var(--secondary); margin-bottom: 10px; font-size: 2.5rem;}
        #game-over p { margin-bottom: 20px; font-size: 1.2rem;}

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border: none;
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover { transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='Games.html'">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="stats">
            <div>Movimientos: <span id="moves">0</span></div>
            <div>Pares: <span id="pairs">0</span>/8</div>
        </div>
    </div>

    <div class="grid" id="grid">
        <!-- Cards will be generated by JS -->
    </div>

    <div id="game-over">
        <h2>¡Felicidades!</h2>
        <p>Completaste el juego en <span id="final-moves">0</span> movimientos.</p>
        <button class="btn" onclick="initGame()">Jugar de Nuevo</button>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const movesSpan = document.getElementById('moves');
        const pairsSpan = document.getElementById('pairs');
        const gameOverScreen = document.getElementById('game-over');
        const finalMovesSpan = document.getElementById('final-moves');

        // Emojis for the cards
        const items = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function initGame() {
            gridElement.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesSpan.innerText = moves;
            pairsSpan.innerText = matchedPairs;
            gameOverScreen.style.display = 'none';
            hasFlippedCard = false;
            lockBoard = false;
            firstCard = null;
            secondCard = null;

            // Create pairs and shuffle
            cards = [...items, ...items];
            cards.sort(() => 0.5 - Math.random());

            // Create HTML elements
            cards.forEach(item => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.item = item;

                card.innerHTML = `
                    <div class="card-face card-back"><i class="fa-solid fa-question"></i></div>
                    <div class="card-face card-front">${item}</div>
                `;

                card.addEventListener('click', flipCard);
                gridElement.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!hasFlippedCard) {
                // First click
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            // Second click
            secondCard = this;
            moves++;
            movesSpan.innerText = moves;

            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.item === secondCard.dataset.item;

            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);

            matchedPairs++;
            pairsSpan.innerText = matchedPairs;

            if (matchedPairs === items.length) {
                setTimeout(() => {
                    finalMovesSpan.innerText = moves;
                    gameOverScreen.style.display = 'block';
                }, 500);
            }

            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;

            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // Start the game on load
        initGame();
    </script>
</body>
</html>
